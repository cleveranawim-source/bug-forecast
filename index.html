<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover가 있어야 env(safe-area-inset-*)에 실제 값이 들어온다(다이내믹 아일랜드 대응).
         maximum-scale·user-scalable: 앱 안에서 핀치/더블탭/입력 포커스 줌으로 화면 배율이 튀는 것 방지 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1877C7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="현재 위치와 시민관측을 바탕으로 동네별 벌레 출몰 위험을 알려주는 앱"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>우리동네 벌레예보</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
